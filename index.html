  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

line-flex;align-items:baseline;gap:4px;}\n  nav .mark em{font-style:italic;color:var(--accent);font-weight:400;}\n  nav ul{display:flex;gap:28px;list-style:none;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-dim);}\n  nav ul a{position:relative;padding:4px 0;transition:color .25s;}\n  nav ul a:hover{color:var(--fg);}\n  nav ul a::before{content:\"\";position:absolute;left:-12px;top:50%;width:4px;height:4px;border-radius:50%;background:var(--accent);transform:translateY(-50%) scale(0);transition:transform .25s;}\n  nav ul a:hover::before{transform:translateY(-50%) scale(1);}\n  @media (max-width:820px){ nav ul{display:none;} }\n\n  /* ---------- HERO ---------- */\n  header.hero{\n    min-height:100vh;\n    padding:140px 0 80px;\n    position:relative;\n    display:flex;flex-direction:column;justify-content:center;\n  }\n  .eyebrow{\n    font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-dim);\n    display:flex;align-items:center;gap:14px;margin-bottom:36px;\n  }\n  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(159,232,215,.12);animation:pulse 2.6s ease-in-out infinite;}\n  @keyframes pulse{50%{box-shadow:0 0 0 9px rgba(159,232,215,0);}}\n  .eyebrow .sep{flex:1;height:1px;background:linear-gradient(to right,var(--line-2),transparent);max-width:120px;}\n\n  h1.display{\n    font-family:var(--serif);font-weight:400;\n    font-size:clamp(56px, 9vw, 132px);\n    line-height:.94;letter-spacing:-.02em;\n    margin-bottom:28px;\n    position:relative;\n  }\n  h1.display .word{display:inline-block;}\n  h1.display .it{font-style:italic;color:var(--accent);}\n  h1.display .amp{font-style:italic;color:var(--fg-dim);font-size:.78em;}\n\n  .hero-grid{\n    display:grid;grid-template-columns: 1.2fr .9fr;gap:64px;align-items:end;\n    margin-top:40px;\n  }\n  @media (max-width:900px){ .hero-grid{grid-template-columns:1fr;gap:40px;} }\n  .lede{\n    font-family:var(--serif);font-size:clamp(20px,2vw,26px);line-height:1.42;color:var(--fg);\n    max-width:560px;font-weight:400;\n  }\n  .lede .mono{font-family:var(--mono);font-size:.75em;color:var(--accent);padding:1px 6px;border:1px solid var(--line-2);border-radius:3px;margin:0 2px;vertical-align:2px;}\n  .lede .faint{color:var(--fg-dim);}\n\n  .hero-meta{\n    display:grid;grid-template-columns:1fr 1fr;gap:28px 32px;\n    font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;color:var(--fg-dim);\n    border-top:1px solid var(--line);padding-top:28px;\n  }\n  .hero-meta dt{text-transform:uppercase;color:var(--fg-faint);font-size:10.5px;letter-spacing:.15em;margin-bottom:6px;}\n  .hero-meta dd{color:var(--fg);font-family:var(--sans);font-size:14px;font-weight:400;}\n  .hero-meta dd b{font-weight:500;color:var(--accent);}\n\n  /* side visual */\n  .latent{\n    position:absolute;right:-60px;top:50%;transform:translateY(-50%);\n    width:540px;height:540px;pointer-events:none;opacity:.65;\n  }\n  @media (max-width:1100px){ .latent{opacity:.3;right:-180px;} }\n\n  .scroll-hint{\n    position:absolute;bottom:32px;left:48px;\n    font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-faint);\n    display:flex;align-items:center;gap:10px;\n  }\n  .scroll-hint .line{width:40px;height:1px;background:var(--fg-faint);position:relative;overflow:hidden;}\n  .scroll-hint .line::after{content:\"\";position:absolute;inset:0;background:var(--accent);transform:translateX(-100%);animation:slide 2.4s ease-in-out infinite;}\n  @keyframes slide{50%{transform:translateX(100%);}100%{transform:translateX(100%);}}\n\n  /* ---------- SECTION SHELL ---------- */\n  section{padding:120px 0;position:relative;}\n  .sec-head{display:grid;grid-template-columns: 180px 1fr;gap:48px;margin-bottom:64px;align-items:baseline;}\n  @media (max-width:820px){ .sec-head{grid-template-columns:1fr;gap:10px;} }\n  .sec-num{font ff-hours<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<div class=\"cursor\" id=\"cursor\"><\u002Fdiv>\n\n<!-- HERO -->\n<header class=\"hero\" id=\"top\">\n  <div class=\"wrap\">\n\n    <div class=\"eyebrow\">\n      <span class=\"dot\"><\u002Fspan>\n      <span>Currently researching · SSL robustness &amp; medical imaging<\u002Fspan>\n      <span class=\"sep\"><\u002Fspan>\n      <span>Delhi · IN<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 class=\"display\">\n      <span class=\"word\">Learning<\u002Fspan><br>\n      <span class=\"word it\">representations<\u002Fspan> <span class=\"word amp\">&amp;<\u002Fspan><br>\n      <span class=\"word\">the structure<\u002Fspan><br>\n      <span class=\"word\">of<\u002Fspan> <span class=\"word it\" style=\"color:var(--accent);\">signal.<\u002Fspan>\n    <\u002Fh1>\n\n    <div class=\"hero-grid\">\n      <p class=\"lede\">\n        I'm <span style=\"color:var(--accent);font-style:italic;\">Arnesh<\u002Fspan> — a CS &amp; AI undergraduate at <span class=\"faint\">IIIT&nbsp;Delhi<\u002Fspan>. My research sits at the intersection of <span class=\"mono\">self-supervised learning<\u002Fspan>, <span class=\"mono\">signal processing<\u002Fspan>, and <span class=\"mono\">deep-learning theory &amp; interpretability<\u002Fspan> — published at <span class=\"faint\">NeurIPS, CVPR, TMLR, INTERSPEECH<\u002Fspan> &amp; <span class=\"faint\">ICMR<\u002Fspan>.\n      <\u002Fp>\n\n      <dl class=\"hero-meta\">\n        <div><dt>Affiliation<\u002Fdt><dd>IIIT Delhi · SBI Lab<\u002Fdd><\u002Fdiv>\n        <div><dt>Collaborators<\u002Fdt><dd>Brown · UCSD<\u002Fdd><\u002Fdiv>\n        <div><dt>Interests<\u002Fdt><dd><b>SSL · Signal · DL Theory<\u002Fb><\u002Fdd><\u002Fdiv>\n        <div><dt>Founder<\u002Fdt><dd>StarkVision · NivionAI<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <!-- latent space SVG -->\n    <svg class=\"latent\" viewBox=\"0 0 540 540\" aria r(--accent);\">Vision<\u002Fem><\u002Fh2>\n          <p style=\"font-family:var(--serif);font-size:22px;line-height:1.4;color:var(--fg);margin-bottom:22px;max-width:480px;\">An independent, <em style=\"font-style:italic;\">student-led<\u002Fem> research community I founded in 2025 — where undergraduates publish at top venues as first authors.<\u002Fp>\n          <p style=\"font-size:14.5px;color:var(--fg-dim);line-height:1.65;max-width:480px;\">20+ members. Three active projects. Mentorship on research methodology, writing, and publication strategy. Everything below carries <b style=\"color:var(--fg);font-weight:500;\">student-only authorship<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <div style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:18px;\">Output · 2024 — 2025<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:48px 1fr auto;gap:20px;padding:18px 0;border-top:1px solid var(--line);align-items:baseline;\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--accent);\">✔<\u002Fdiv>\n            <div><div style=\"font-family:var(--serif);font-size:20px;line-height:1.25;\">M-SCAN · Lumbar Stenosis Grading<\u002Fdiv><div style=\"font-size:12.5px;color:var(--fg-dim);margin-top:3px;\">Multi-view cross-attention for spinal MRI<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--fg);text-transform:uppercase;\">CVPR '25 · Demo<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:48px 1fr auto;gap:20px;padding:18px 0;border-top:1px solid var(--line);align-items:baseline;\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--accent);\">✔<\u002Fdiv>\n            <div><div style=\"font-family:var(--serif);font-size:20px;line-height:1.25;\">Melody or Machine · Synthetic Music Detection<\u002Fdiv><div style=\"font-size:12.5px;color:var(--fg-dim);margin-top:3px;\">Cross-modal contrastive alignment<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--fg);text-transform:uppercase;\">TMLR<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:48px 1fr auto;gap:20px;padding:18px 0;border-top:1px solid var(--line);align-items:baseline;\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--accent);\">✔<\u002Fdiv>\n            <div><div style=\"font-family:var(--serif);font-size:20px;line-height:1.25;\">SocialDF · Deepfake Detection<\u002Fdiv><div style=\"font-size:12.5px;color:var(--fg-dim);margin-top:3px;\">Benchmark + model for harmful synthetic content<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--fg);text-transform:uppercase;\">ICMR '25 · Workshop<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:48px 1fr auto;gap:20px;padding:18px 0;border-top:1px solid var(--line);align-items:baseline;\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--accent);\">✔<\u002Fdiv>\n            <div><div style=\"font-family:var(--serif);font-size:20px;line-height:1.25;\">CLAM · AI for Music<\u002Fdiv><div style=\"font-size:12.5px;color:var(--fg-dim);margin-top:3px;\">Safeguarding authenticity in the music industry<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--fg);text-transform:uppercase;\">NeurIPS '25 · Workshop<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:48px 1fr auto;gap:20px;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);align-items:baseline;\">\n            <div style=\"font-family:var(--mono); astive Learning<\u002Fspan>\n          <span class=\"vpin\">Audio Forensics<\u002Fspan>\n          <a class=\"vpin warm\" href=\"https://openreview.net/pdf?id=Ufwes0o2e3\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;\">Read PDF ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <svg class=\"spectro\" viewBox=\"0 0 200 200\" aria-hidden=\"true\">\n        <defs>\n          <radialGradient id=\"phase\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n            <stop offset=\"0%\" stop-color=\"#9fe8d7\" stop-opacity=\".9\"><\u002Fstop>\n            <stop offset=\"30%\" stop-color=\"#e6b980\" stop-opacity=\".6\"><\u002Fstop>\n            <stop offset=\"70%\" stop-color=\"#5d5aa7\" stop-opacity=\".3\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#0b0c0e\" stop-opacity=\"0\"><\u002Fstop>\n          <\u002FradialGradient>\n        <\u002Fdefs>\n        <rect x=\"0\" y=\"0\" width=\"200\" height=\"200\" fill=\"#0b0c0e\"><\u002Frect>\n        <rect x=\"0\" y=\"0\" width=\"200\" height=\"200\" fill=\"url(#phase)\"><\u002Frect>\n        <g stroke=\"#9fe8d7\" stroke-width=\".3\" fill=\"none\" opacity=\".4\" id=\"phaseRings\"><\u002Fg>\n        <g fill=\"#ece7dc\" opacity=\".7\" id=\"phaseDots\"><\u002Fg>\n        <g stroke=\"#2e3138\" stroke-width=\".3\">\n          <line x1=\"100\" y1=\"0\" x2=\"100\" y2=\"200\"><\u002Fline>\n          <line x1=\"0\" y1=\"100\" x2=\"200\" y2=\"100\"><\u002Fline>\n        <\u002Fg>\n        <text x=\"6\" y=\"12\" font-family=\"JetBrains Mono\" font-size=\"7\" fill=\"#6b6a63\">FFT · log |F(ω)|<\u002Ftext>\n        <text x=\"140\" y=\"194\" font-family=\"JetBrains Mono\" font-size=\"7\" fill=\"#6b6a63\">ω → π<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- filters -->\n    <div class=\"filter\" id=\"filter\">\n      <button class=\"on\" data-f=\"all\">All · 7<\u002Fbutton>\n      <button data-f=\"J\">Journal<\u002Fbutton>\n      <button data-f=\"C\">Conference<\u002Fbutton>\n      <button data-f=\"W\">Wor v class=\"venue\"><b>CVPR 2025<\u002Fb> · Demo Track<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"link\" href=\"https://arxiv.org/abs/2503.01634\" target=\"_blank\" rel=\"noopener\">arXiv <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"pub\" data-type=\"W\">\n        <div class=\"tag\"><b>W.1<\u002Fb>2025<\u002Fdiv>\n        <div>\n          <div class=\"title\"><em>Relational<\u002Fem> Representation Learning<\u002Fdiv>\n          <div class=\"authors\">Lucas Maes, Ian K Hajra, <span class=\"me\">Arnesh Batra<\u002Fspan>, Hugues Van Assel, Damien Scieur, Randall Balestriero<\u002Fdiv>\n          <div class=\"venue\"><b>NeurIPS 2025<\u002Fb> Workshop · UniReps — Unifying Representations in Neural Models<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"link\" href=\"https://openreview.net/pdf?id=NkbiQOn5SI\" target=\"_blank\" rel=\"noopener\">PDF <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"pub\" data-type=\"W\">\n        <div class=\"tag\"><b>W.2<\u002Fb>2025<\u002Fdiv>\n        <div>\n          <div class=\"title\">CLAM: Safeguarding <em>Authenticity<\u002Fem> &amp; Addressing Implications for the Music Industry<\u002Fdiv>\n          <div class=\"authors\"><span class=\"me\">Arnesh Batra<\u002Fspan>, Dev Sharma, Krish Thukral, Ruhani Bhatia, Naman Batra, Aditya Gautam<\u002Fdiv>\n          <div class=\"venue\"><b>NeurIPS 2025<\u002Fb> Workshop · AI for Music<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"link\" href=\"https://openreview.net/pdf?id=aSKzwf623x\" target=\"_blank\" rel=\"noopener\">PDF <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"pub\" data-type=\"W\">\n        <div class=\"tag\"><b>W.3<\u002Fb>2025<\u002Fdiv>\n        <div>\n          <div class=\"title\">SocialDF: Benchmark Dataset &amp; Detection Model for Mitigating Harmful <em>Deepfake<\u002Fem> Content on Social Media<\u002Fdiv>\n          <div class=\"authors\"><span class=\"me\">Arnesh Batra<\u002Fspan>, Anushk Kumar, Jashn Khemani, Arush Gumber, Arhan Jain, Somil Gupta<\u002Fdiv>\n          <div class=\"venue\"><b>ACM ICMR 2025<\u002Fb> Workshop · MAD'25<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"link\" href=\"https://dl.acm.org/doi/10.1145/3733567.3735573\" target=\"_blank\" rel=\"noopener\">ACM <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"pub\" data-type=\"W\">\n        <div class=\"tag\"><b>W.4<\u002Fb>2025<\u002Fdiv>\n        <div>\n          <div class=\"title\">DentalNet: Geometric Aware Multi-View Transformer for <em>Occlusion Grade<\u002Fem> Prediction in Dental 3D Scans<\u002Fdiv>\n          <div class=\"authors\"><span class=\"me\">Arnesh Batra<\u002Fspan>, Arush Gumber, Vaibhav Sharma, Peemit, Rinkle Sardana, Tulika Tripathi, Anubha Gupta<\u002Fdiv>\n          <div class=\"venue\"><b>NeurIPS 2025<\u002Fb> Workshop · Imageomics<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"link\" href=\"https://openreview.net/pdf?id=PpDLNxxeYQ\" target=\"_blank\" rel=\"noopener\">PDF <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPERIENCE -->\n<section id=\"experience\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\"><span class=\"bar\"><\u002Fspan>03 / Experience<\u002Fdiv>\n      <div>\n        <h2 class=\"sec-title\">Labs <em>&amp;<\u002Fem><br>collaborators.<\u002Fh2>\n        <p class=\"sec-sub\">Working across academia and industry — from FAIR/Brown to medical-imaging labs at IIIT Delhi and startups building production-grade AI.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"exp-grid\">\n\n      <div class=\"xp\">\n        <div class=\"when\">May 2025 — present<\u002Fdiv>\n        <div>\n          <div class=\"org\">Nivion<em>AI<\u002Fem><\u002Fdiv>\n          <div class=\"role\">Co-Founder<\u002Fdiv>\n          <div class=\"desc\">Re-imagining industry workflows through AI-driven innovation grounded in state-of-the-art research. <b>Cleared Stage 1 of the AI Grand Challenge<\u002Fb> organized by NCIIPC, Government of India.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Delhi · IN<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"xp\">\n        <div class=\"when\">May 2025 — Dec 2025<\u002Fdiv>\n        <div>\n          <div class=\"org\">Brown <em>University<\u002Fem><\u002Fdiv>\n          <div class=\"role\">Research Collaborator · w/ Prof. Randall Balestriero (FAIR/Brown)<\u002Fdiv>\n          <div class=\"desc\">Theoretical research on <b>self-supervised learning frameworks<\u002Fb> — representation robustness, generalization, mathematical analysis and empirical validation. Work accepted at <b>NeurIPS '25 UniReps<\u002Fb>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Remote<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"xp\">\n        <div class=\"when\">May 2025 — present<\u002Fdiv>\n        <div>\n          <div class=\"org\">SBI Lab · IIIT <em>Delhi<\u002Fem><\u002Fdiv>\n          <div class=\"role\">Research Intern · w/ Prof. Anubha Gupta<\u002Fdiv>\n          <div class=\"desc\">Medical image analysis across 2D and 3D modalities — blood-cell, dental and spinal imaging. Designing hybrid transformer architectures integrating volumetric and multi-view data with <b>SOTA performance on multiple datasets<\u002Fb>. Work under review at <b>ECCV 2026<\u002Fb>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Delhi · IN<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"xp\">\n        <div class=\"when\">Feb 2025 — May 2025<\u002Fdiv>\n        <div>\n          <div class=\"org\">UC San <em>Diego<\u002Fem><\u002Fdiv>\n          <div class=\"role\">Research Intern · w/ Prof. Pengtao Xie<\u002Fdiv>\n          <div class=\"desc\">Built the <b>first LLM framework for DNA-RNA interaction prediction<\u002Fb>. Curated a 100k+ sequence dataset, proposed lightweight genomics architectures achieving substantial scalability and efficiency gains.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Remote<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"xp\">\n        <div class=\"when\">May 2025 — Jul 2025<\u002Fdiv>\n        <div>\n          <div class=\"org\">Mythya<em>verse<\u002Fem><\u002Fdiv>\n          <div class=\"role\">AI Engineering Intern<\u002Fdiv>\n          <div class=\"desc\">Explainable deep-learning models for ECG signal interpretation. Built a real-time sign-language translation system using transformer architectures — <b>95%+ accuracy on Arabic Sign Language<\u002Fb>. Shipped LLM + multimodal pipelines into production.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Remote<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"xp\">\n        <div class=\"when\">May 2024 — Oct 2024<\u002Fdiv>\n        <div>\n          <div class=\"org\">HMI Lab · IIIT <em>Delhi<\u002Fem><\u002Fdiv>\n          <div class=\"role\">Research Intern · w/ Prof. Jainendra Shukla<\u002Fdiv>\n          <div class=\"desc\">Multimodal LLMs for dynamic tasks — <b>live sports commentary<\u002Fb> and fine-grained video captioning. Designed and benchmarked video encoders and attention-based fusion pipelines.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"place\"><span class=\"pi\">●<\u002Fspan> Delhi · IN<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROJECTS + HONORS -->\n<section id=\"projects\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\"><span class=\"bar\"><\u002Fspan>04 / Elsewhere<\u002Fdiv>\n      <div>\n        <h2 class=\"sec-title\">Projects, <em>awards<\u002Fem><br>&amp; leadership.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class <\u002Fb><span>Rank 13 / 20,000<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">Price prediction from product image + description.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>Smart India Hackathon 2024<\u002Fb><span>Top 2 · Finals<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">RE-DACT selected for grand finale at IIT Kharagpur.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>Grand AI Challenge PS-03<\u002Fb><span>Top 6 / 100+<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">NCIIPC · Government of India · cleared Stage 1.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>F1nalyze · Formula 1 Datathon<\u002Fb><span>1st place<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">Kaggle competition.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>ML Hackathon · IIT Jodhpur<\u002Fb><span>4th place<\u002Fspan><\u002Fdiv>\n          <div class=\"s\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>FILL THE VOID() · IIT Jammu<\u002Fb><span>5th place<\u002Fspan><\u002Fdiv>\n          <div class=\"s\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>JEE Main<\u002Fb><span>99.72 %ile · AIR 3334<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">Out of 1.2 million candidates.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"list-title\" style=\"margin-top:56px;\">Academic <em>service<\u002Fem><\u002Fh3>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>Reviewer · ACM ICMR 2025<\u002Fb><span><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>Reviewer · NeurIPS Workshops 2025<\u002Fb><span><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"li-item\">\n          <div class=\"t\"><b>Teaching<\u002Fb><span>50+ students<\u002Fspan><\u002Fdiv>\n          <div class=\"s\">Neural networks &amp; data analysis fundamentals (NumPy, Pandas).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OFF-HOURS -->\n<section id=\"offhours\" style=\"padding:60px 0 120px;\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\"><span class=\"bar\"><\u002Fspan>05 / Off-hours<\u002Fdiv>\n      <div>\n        <h2 class=\"sec-title\">Away from the <em>terminal<\u002Fem>.<\u002Fh2>\n        <p class=\"sec-sub\">When I'm not reading papers or training models — I'm usually somewhere with a camera, a racquet, or a window seat.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hobbies\">\n      <a class=\"hobby\" href=\"https://www.instagram.com/arnesh_photography_/\" target=\"_blank\" rel=\"noopener\">\n        <div class=\"hobby-art\">\n          <svg viewBox=\"0 0 300 220\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n            <defs>\n              <linearGradient id=\"hg1\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#1a1b20\"><\u002Fstop>\n                <stop offset=\"60%\" stop-color=\"#0f1013\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#070709\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <radialGradient id=\"hg1r\" cx=\"70%\" cy=\"35%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#9fe8d7\" stop-opacity=\".28\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#9fe8d7\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n            <\u002Fdefs>\n            <rect width=\"300\" height=\"220\" fill=\"url(#hg1)\"><\u002Frect>\n            <rect width=\"300\" height=\"220\" fill=\"url(#hg1r)\"><\u002Frect>\n            <g fill=\"none\" stroke=\"#ece7dc\" stroke-opacity=\".55\" stroke-width=\"1.1\">\n              <rect x=\"92\" fill=\"url(#hg2)\"><\u002Frect>\n            <!-- court -->\n            <g stroke=\"#e6b980\" stroke-opacity=\".45\" stroke-width=\"1\" fill=\"none\">\n              <rect x=\"60\" y=\"30\" width=\"180\" height=\"160\" rx=\"2\"><\u002Frect>\n              <line x1=\"60\" y1=\"110\" x2=\"240\" y2=\"110\"><\u002Fline>\n              <line x1=\"150\" y1=\"30\" x2=\"150\" y2=\"190\"><\u002Fline>\n              <line x1=\"90\" y1=\"30\" x2=\"90\" y2=\"190\"><\u002Fline>\n              <line x1=\"210\" y1=\"30\" x2=\"210\" y2=\"190\"><\u002Fline>\n              <line x1=\"60\" y1=\"80\" x2=\"240\" y2=\"80\" stroke-dasharray=\"3 3\" stroke-opacity=\".25\"><\u002Fline>\n              <line x1=\"60\" y1=\"140\" x2=\"240\" y2=\"140\" stroke-dasharray=\"3 3\" stroke-opacity=\".25\"><\u002Fline>\n            <\u002Fg>\n            <!-- shuttlecock trajectory -->\n            <path d=\"M 80 170 Q 150 20 220 150\" stroke=\"#9fe8d7\" stroke-opacity=\".5\" stroke-width=\".8\" fill=\"none\" stroke-dasharray=\"2 3\"><\u002Fpath>\n            <g fill=\"#ece7dc\">\n              <circle cx=\"220\" cy=\"150\" r=\"2.5\"><\u002Fcircle>\n              <path d=\"M 218 148 L 226 142 M 220 150 L 228 148 M 220 152 L 228 156 M 218 152 L 226 158\" stroke=\"#ece7dc\" stroke-width=\".6\"><\u002Fpath>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"hobby-body\">\n          <div class=\"hobby-cap\">02 · Badminton<\u002Fdiv>\n          <h3>Fast, <em>cross-court<\u002Fem>.<\u002Fh3>\n          <p>Played since school. It's the one place I don't overthink — reaction, footwork, the satisfying click of a clean smash.<\u002Fp>\n          <div class=\"hobby-cta\" style=\"color:var(--fg-faint);pointer-events:none;\">Doubles preferred<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hobby\">\n        <div class=\"hobby-art\">\n          <svg viewBox=\"0 0 300 220\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n            <defs>\n              <linearGradient id=\"hg3\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#17181c\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#0a0b0d\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <rect width=\"300\" height=\"220\" fill=\"url(#hg3)\"><\u002Frect>\n            <!-- abstract map lines -->\n            <g stroke=\"#9fe8d7\" stroke-opacity=\".35\" fill=\"none\" stroke-width=\".6\">\n              <path d=\"M 20 140 C 60 120 90 150 130 130 S 200 100 240 120 S 290 140 300 135\"><\u002Fpath>\n              <path d=\"M 10 160 C 50 170 100 145 140 160 S 210 180 260 150\" stroke-opacity=\".2\"><\u002Fpath>\n              <path d=\"M 30 100 C 70 80 120 105 170 90 S 230 110 280 95\" stroke-opacity=\".2\"><\u002Fpath>\n            <\u002Fg>\n            <!-- flight path dashed -->\n            <path d=\"M 50 175 Q 150 30 250 110\" stroke=\"#e6b980\" stroke-opacity=\".7\" stroke-width=\".8\" fill=\"none\" stroke-dasharray=\"3 4\"><\u002Fpath>\n            <g fill=\"#ece7dc\">\n              <circle cx=\"50\" cy=\"175\" r=\"2.5\"><\u002Fcircle>\n              <circle cx=\"250\" cy=\"110\" r=\"2.5\" fill=\"#9fe8d7\"><\u002Fcircle>\n            <\u002Fg>\n            <g font-family=\"JetBrains Mono\" font-size=\"7\" fill=\"#6b6a63\">\n              <text x=\"56\" y=\"188\">DEL<\u002Ftext>\n              <text x=\"234\" y=\"103\">→<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"hobby-body\">\n          <div class=\"hobby-cap\">03 · Travel<\u002Fdiv>\n          <h3>New cities, <em>same notebook<\u002Fem>.<\u002Fh3>\n          <p>Somewhere between changing skylines and unfamiliar menus — most of my best ideas arrive on a train.<\u002Fp>\n          <div class=\"hobby-cta\" style=\"color:var(--fg-faint);pointer-events:none;\">Next: open<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- marquee -->\n    <div class=\"marquee\" aria-hidden=\"true\">\n      <div class=\"marquee-track\">\n        <span>Self-Supervised Learning<\u002Fspan><span>•<\u002Fspan>\n        <span>Signal Processing<\u002Fspan><span>•<\u002Fspan>\n        <span>Deep-Learning Theory<\u002Fspan><span>•<\u002Fspan>\n        <span>Interpretability<\u002Fspan><span>•<\u002Fspan>\n        <span>Representations<\u002Fspan><span>•<\u002Fspan>\n        <span>Photography<\u002Fspan><span>•<\u002Fspan>\n        <span>Badminton<\u002Fspan><span>•<\u002Fspan>\n        <span>Travel<\u002Fspan><span>•<\u002Fspan>\n        <span>Self-Supervised Learning<\u002Fspan><span>•<\u002Fspan>\n        <span>Signal Processing<\u002Fspan><span>•<\u002Fspan>\n        <span>Deep-Learning Theory<\u002Fspan><span>•<\u002Fspan>\n        <span>Interpretability<\u002Fspan><span>•<\u002Fspan>\n        <span>Representations<\u002Fspan><span>•<\u002Fspan>\n        <span>Photography<\u002Fspan><span>•<\u002Fspan>\n        <span>Badminton<\u002Fspan><span>•<\u002Fspan>\n        <span>Travel<\u002Fspan><span>•<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER / CONTACT -->\n<footer id=\"contact\">\n  <div class=\"wrap\">\n    <div class=\"contact\">\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:28px;\"><span class=\"dot\"><\u002Fspan><span>Open to research collaborations &amp; PhD conversations<\u002Fspan><\u002Fdiv>\n        <h2>Let's <em>talk<\u002Fem><br>about self-supervised learning,<br>signal, or <em>interpretability<\u002Fem>.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"contact-links\">\n        <a class=\"clink\" href=\"mailto:arnesh23129@iiitd.ac.in\"><span>Email<\u002Fspan><span>arnesh23129@iiitd.ac.in <span class=\"arrow\">↗<\u002Fspan><\u002Fspan><\u002Fa>\n        <a class=\"clink\" href=\"https://linkedin.com/in/arnesh-batra-9684a4211\" target=\"_blank\" rel=\"noopener\"><span>LinkedIn<\u002Fspan><span>/in/arnesh-batra <span class=\"arrow\">↗<\u002Fspan><\u002Fspan><\u002Fa>\n        <a class=\"clink\" href=\"https://github.com/arnesh2212\" target=\"_blank\" rel=\"noopener\"><span>GitHub<\u002Fspan><span>@arnesh2212 <span class=\"arrow\">↗<\u002Fspan><\u002Fspan><\u002Fa>\n        <a class=\"clink\" href=\"https://www.instagram.com/arnesh_photography_/\" target=\"_blank\" rel=\"noopener\"><span>Instagram<\u002Fspan><span>@arnesh_photography_ <span class=\"arrow\">↗<\u002Fspan><\u002Fspan><\u002Fa>\n        <a class=\"clink\" href=\"tel:+919315840114\"><span>Phone<\u002Fspan><span>+91 93158 40114 <span class=\"arrow\">↗<\u002Fspan><\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\">\n      <div>© 2026 · Arnesh Batra<\u002Fdiv>\n      <div>Portfolio v1 · Designed with care<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Latent space points\n(function(){\n  const pts = document.getElementById('points');\n  const lns = document.getElementById('lines');\n  if(!pts) return;\n  const N = 70; const cx=270, cy=270;\n  const nodes = [];\n  for(let i=0;i<N;i++){\n    const r = Math.pow(Math.random(),.6)*230;\n    const a = Math.random()*Math.PI*2;\n    const x = cx + Math.cos(a)*r;\n    const y = cy + Math.sin(a)*r;\n    const s = .7 + Math.random()*2.2;\n    const op = .3 + Math.random()*.7;\n    const cluster = r < 80 ? 0 : r < 160 ? 1 : 2;\n    const color = cluster===0?'#9fe8d7':cluster===1?'#ece7dc':'#6b6a63';\n    nodes.push({x,y,s,color,op,cluster});\n    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');\n    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',s);\n    c.setAttribute('fill',color);c.setAttribute('opacity',op);\n    pts.appendChild(c);\n  }\n  // k-nearest lines\n  for(let i=0;i<nodes.length;i++){\n    const dists = nodes.map((n,j)=>({j, d: Math.hypot(n.x-nodes[i].x, n.y-nodes[i].y)})).sort((a,b)=>a.d-b.d);\n    for(let k=1;k<3;k++){\n      const j = dists[k].j;\n      if(j<i) continue;\n      const ln = document.createElementNS('http://www.w3.org/2000/svg','line');\n      ln.setAttribute('x1',nodes[i].x);ln.setAttribute('y1',nodes[i].y);\n      ln.setAttribute('x2',nodes[j].x);ln.setAttribute('y2',nodes[j].y);\n      ln.setAttribute('opacity', Math.max(.05, .4 - dists[k].d/300));\n      lns.appendChild(ln);\n    }\n  }\n})();\n\n// phase rings\n(function(){\n  const rings = document.getElementById('phaseRings');\n  const dots = document.getElementById('phaseDots');\n  if(!rings) return;\n  for(let r=10;r<100;r+=8){\n    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');\n    c.setAttribute('cx',100);c.setAttribute('cy',100);c.setAttribute('r',r);\n    rings.appendChild(c);\n  }\n  for(let i=0;i<180;i++){\n    const a = Math.random()*Math.PI*2;\n    const r = Math.pow(Math.random(),2)*90 + 2;\n    const x = 100 + Math.cos(a)*r;\n    const y = 100 + Math.sin(a)*r;\n    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');\n    c.setAttribute('cx',x);c.setAttribute('cy',y);\n    c.setAttribute('r', .4 + Math.random()*1.6);\n    c.setAttribute('opacity', .2 + Math.random()*.7);\n    dots.appendChild(c);\n  }\n})();\n\n// filter\n(function(){\n  const btns = document.querySelectorAll('#filter button');\n  const items = document.querySelectorAll('#pubs .pub');\n  btns.forEach(b=>b.addEventListener('click',()=>{\n    btns.forEach(x=>x.classList.remove('on'));\n    b.classList.add('on');\n    const f = b.dataset.f;\n    items.forEach(it=>{\n      const show = f==='all' || it.dataset.type===f;\n      it.style.display = show ? '' : 'none';\n    });\n  }));\n})();\n\n// reveal on scroll\n(function(){\n  const els = document.querySelectorAll('.reveal, .pub, .xp, .stat, .li-item');\n  els.forEach(e=>e.classList.add('reveal'));\n  const io = new IntersectionObserver(entries=>{\n    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });\n  },{threshold:.08});\n  els.forEach(e=>io.observe(e));\n})();\n\n// cursor\n(function(){\n  const c = document.getElementById('cursor');\n  if(!c) return;\n  let x=0,y=0,tx=0,ty=0;\n  window.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});\n  (function loop(){\n    x += (tx-x)*.18; y += (ty-y)*.18;\n    c.style.left = x+'px'; c.style.top = y+'px';\n    requestAnimationFrame(loop);\n  })();\n  document.querySelectorAll('a, button').forEach(el=>{\n    el.addEventListener('mouseenter',()=>{c.style.width='40px';c.style.height='40px';c.style.opacity='.4';});\n    el.addEventListener('mouseleave',()=>{c.style.width='18px';c.style.height='18px';c.style.opacity='.7';});\n  });\n})();\n\n// magnetic links\n(function(){\n  document.querySelectorAll('.clink, .hobby, nav ul a, .pub .link, .vpin').forEach(el=>{\n    el.addEventListener('mousemove',e=>{\n      const r = el.getBoundingClientRect();\n      const x = e.clientX - r.left - r.width/2;\n      const y = e.clientY - r.top - r.height/2;\n      el.style.transform = `translate(${x*.08}px, ${y*.08}px)`;\n      el.style.transition = 'transform .15s ease-out';\n    });\n    el.addEventListener('mouseleave',()=>{\n      el.style.transform = '';\n      el.style.transition = 'transform .5s cubic-bezier(.2,.7,.2,1)';\n    });\n  });\n})();\n\n// hero parallax on mouse\n(function(){\n  const latent = document.querySelector('.latent');\n  if(!latent) return;\n  let tx=0,ty=0,cx=0,cy=0;\n  window.addEventListener('mousemove',e=>{\n    tx = (e.clientX/window.innerWidth - .5) * 40;\n    ty = (e.clientY/window.innerHeight - .5) * 40;\n  });\n  (function loop(){\n    cx += (tx-cx)*.06; cy += (ty-cy)*.06;\n    latent.style.transform = `translateY(-50%) translate(${cx}px, ${cy}px)`;\n    requestAnimationFrame(loop);\n  })();\n})();\n\n// smooth scroll for nav\ndocument.querySelectorAll('nav a[href^=\"#\"]').forEach(a=>{\n  a.addEventListener('click',e=>{\n    const id = a.getAttribute('href');\n    if(id.length>1){\n      e.preventDefault();\n      const el = document.querySelector(id);\n      if(el){ const y = el.getBoundingClientRect().top + window.pageYOffset - 40; window.scrollTo({top:y, behavior:'smooth'}); }\n    }\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
